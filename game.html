    <main>
        <section class="card app-container">
            <h2>Kalkulator BMI Interaktif</h2>
            <p style="margin-bottom: 1.5rem;">Kira Indeks Jisim Badan (BMI) anda menggunakan aplikasi JavaScript di bawah.</p>

            <div class="form-group" style="text-align: left;">
                <label for="weight">Berat Badan (kg):</label>
                <input type="number" id="weight" class="form-control" placeholder="Contoh: 65">
            </div>

            <div class="form-group" style="text-align: left;">
                <label for="height">Tinggi (cm):</label>
                <input type="number" id="height" class="form-control" placeholder="Contoh: 170">
            </div>

            <button class="btn" onclick="calculateBMI()">Kira BMI Now</button>

            <div id="bmi-result"></div>
        </section>
